name: Release

# Pushing a tag like v0.1.1 builds the single-file Windows exe and attaches it to a
# DRAFT GitHub release. Publishing is a deliberate manual step (see global ship.md).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish single-file self-contained (win-x64)
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          Write-Host "Building version $v from tag ${{ github.ref_name }}"
          dotnet publish src/VirtualMirage/VirtualMirage.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:Version=$v -o publish
          # Portable asset (secondary download).
          Copy-Item publish/VirtualMirage.exe publish/VirtualMirage-win-x64.exe
          Get-ChildItem publish | Select-Object Name, Length

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=$v installer\VirtualMirage.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit $LASTEXITCODE" }
          Get-ChildItem installer-out\VirtualMirage-Setup.exe | Select-Object Name, Length

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          # VirtualMirage-Setup.exe is the primary (matched by the updater's "Setup.exe" substring);
          # the portable win-x64.exe is a secondary download.
          files: |
            installer-out/VirtualMirage-Setup.exe
            publish/VirtualMirage-win-x64.exe
